version: "3.8"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signaldesk-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: python -m src.cli bot
    networks:
      - signaldesk

  digest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signaldesk-digest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    # Run digest daily at 20:00 (use cron schedule)
    command: >
      sh -c "while true; do
        sleep $$((86400 - $$(date +%s) % 86400));
        python -m src.cli digest;
        sleep 60;
      done"
    networks:
      - signaldesk

networks:
  signaldesk:
    driver: bridge
