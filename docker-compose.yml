version: "3.8"

services:
  signaldesk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signaldesk
    restart: always
    env_file:
      - .env
    volumes:
      - signaldesk-data:/app/data
    # 不需要暴露端口！Telegram Bot 使用 polling 模式，
    # 容器主动拉取消息，不需要公网访问
    command: >
      sh -c "
        # Run bot in background, main process as digest scheduler
        python -m src.cli bot &
        # Sleep until 20:00 then run digest
        while true; do
          TARGET=\$(date -d '20:00' +%s)
          NOW=\$(date +%s)
          [ \$TARGET -lt \$NOW ] && TARGET=\$((\$TARGET + 86400))
          sleep \$((TARGET - NOW))
          python -m src.cli digest || true
        done
      "

volumes:
  signaldesk-data:
